services:
  # ── Go application (internal only, not exposed to host) ─────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: fileserver
    expose:
      - "${SERVER_PORT}"
    env_file:
      - .env
    volumes:
      - ./content:/app/content
      - ./cookies.txt:/app/cookies.txt
      - ./.env:/app/.env:ro
    networks:
      - internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:${SERVER_PORT}/health"]
      interval: 60m
      timeout: 10s
      retries: 3
      start_period: 1h

  # ── Nginx reverse proxy (TLS termination) ───────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.3"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider --no-check-certificate https://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # ── Telegram bot ────────────────────────────────────────────────────
  bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: bot
    env_file:
      - .env
    environment:
      - FILE_SERVER_URL=http://app:${SERVER_PORT}/api/reel
      - PUBLIC_SERVER_URL=https://${DOMAIN}/api/reel
    volumes:
      - ./.env:/app/.env:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.2"

  # ── Certbot (certificate renewal) ──────────────────────────────────
  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - nginx
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'"
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
    driver: bridge
